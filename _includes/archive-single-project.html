<article class="project-card">
  <div class="project-card__body">

    <h2 class="project-card__title">
      <a href="{{ base_path }}{{ include.post.url }}">
        {{ include.post.title }}
      </a>
    </h2>

    {% if include.post.excerpt %}
      <p class="project-card__excerpt">
        {{ include.post.excerpt | markdownify | strip_html }}
      </p>
    {% endif %}

    {% if include.post.teaser %}
      <div class="project-card__image">
        <img src="{{ include.post.teaser | relative_url }}" alt="{{ include.post.title }}">
      </div>
    {% endif %}

    {% if include.post.buttons %}
      <div class="project-card__actions">
        {% for btn in include.post.buttons %}
          <a href="{{ btn.url }}"
             class="home-btn home-btn--{{ btn.color | default: 'gray' }}"
             {% if btn.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
            {{ btn.text }}
          </a>
        {% endfor %}
      </div>
    {% endif %}

  </div>
</article>
